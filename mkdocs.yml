# SRv6.md - The Open SRv6 Knowledge Base
site_name: Open SRv6
site_url: https://srv6.md
site_description: The open-source knowledge base for Segment Routing over IPv6 (SRv6)
site_author: SRv6.md Community
copyright: >
  Made with 💜 by the SRv6 community &mdash;
  <a href="https://github.com/eldaninavas/srv6.md/blob/main/LICENSE">MIT License</a> &middot;
  <a href="/community/legal/">Legal & Disclaimer</a>

repo_url: https://github.com/eldaninavas/srv6.md
repo_name: eldaninavas/srv6.md

hooks:
  - hooks/generate_graph.py
edit_uri: edit/main/docs/

theme:
  name: material
  custom_dir: overrides
  language: en
  logo: assets/images/logo.svg
  favicon: assets/images/favicon.svg
  icon:
    repo: fontawesome/brands/github
    edit: material/pencil
    view: material/eye
    admonition:
      note: material/pencil-circle
      abstract: material/clipboard-text
      info: material/information
      tip: material/fire
      success: material/check-circle
      question: material/help-circle
      warning: material/alert
      failure: material/close-circle
      danger: material/lightning-bolt
      bug: material/bug
      example: material/test-tube
      quote: material/format-quote-close

  palette:
    - scheme: slate
      primary: deep purple
      accent: purple
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
    - scheme: default
      primary: deep purple
      accent: purple
      toggle:
        icon: material/weather-night
        name: Switch to dark mode

  font:
    text: Inter
    code: JetBrains Mono

  features:
    - navigation.instant
    - navigation.instant.progress
    - navigation.tracking
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.path
    - navigation.top
    - navigation.indexes
    - navigation.footer
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.annotate
    - content.action.edit
    - content.action.view
    - content.tabs.link
    - content.tooltips
    - toc.follow
    - announce.dismiss
    - header.autohide

extra_css:
  - assets/stylesheets/custom.css?v=20260408

extra_javascript:
  - assets/javascripts/custom.js

plugins:
  - search:
      separator: '[\s\-\.]+'
      lang: en
  - tags: {}
  - minify:
      minify_html: true

markdown_extensions:
  - abbr
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
      toc_depth: 3
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.betterem
  - pymdownx.caret
  - pymdownx.mark
  - pymdownx.tilde
  - pymdownx.critic
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.smartsymbols
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
      slugify: !!python/object/apply:pymdownx.slugs.slugify
        kwds:
          case: lower
  - pymdownx.tasklist:
      custom_checkbox: true

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/eldaninavas/srv6.md
      name: GitHub
  generator: false
  analytics:
    provider: google
    property: G-XXXXXXXXXX
  consent:
    title: Cookie consent
    description: >-
      We use cookies to recognize your repeated visits and preferences, as well
      as to measure the effectiveness of our documentation and whether users
      find what they're searching for. With your consent, you're helping us to
      make our documentation better.

nav:
  - Home:
    - index.md
    - Knowledge Graph: knowledge-graph.md
  - Topics:
    - topics/index.md
    - Foundations:
      - What is SRv6?: topics/what-is-srv6.md
      - SID Structure: topics/sid-structure.md
      - Network Programming: topics/network-programming.md
      - SRH & Packet Walk: topics/srh-packet-walk.md
      - SRv6 vs SR-MPLS: topics/srv6-vs-sr-mpls.md
    - Architecture:
      - uSID Compression: topics/usid-compression.md
      - Flex-Algorithm: topics/flex-algorithm.md
      - BGP Overlay: topics/bgp-overlay-services.md
      - TI-LFA: topics/ti-lfa.md
      - CLOS & Load Balancing: topics/clos-glb.md
    - Services:
      - EVPN Multihoming: topics/evpn-multihoming.md
      - QoS: topics/qos.md
      - Multicast: topics/multicast.md
    - Operations:
      - Security: topics/security.md
      - OAM: topics/oam-troubleshooting.md
      - SRPM: topics/srpm.md
      - Telemetry: topics/telemetry.md
      - Performance: topics/performance-scaling.md
      - Migration: topics/interworking-migration.md
    - Platforms:
      - SONiC & SAI: topics/sonic-sai.md
      - Host SRv6: topics/host-based-srv6.md
  - Use Cases:
    - use-cases/index.md
    - Traffic Engineering: use-cases/traffic-engineering.md
    - VPN Services: use-cases/vpn-services.md
    - Service Chaining: use-cases/service-chaining.md
    - Satellite: use-cases/satellite-connectivity.md
    - 5G Transport: use-cases/5g-transport.md
    - AI/ML Networks: use-cases/ai-networking.md
    - SD-WAN: use-cases/sd-wan.md
    - Cloud Backbone: use-cases/boost-mobile.md
    - Deployments: use-cases/deployments.md
  - Implementations:
    - implementations/index.md
    - Linux Kernel: implementations/linux-kernel.md
    - Cisco IOS-XR: implementations/cisco-ios-xr.md
    - Juniper: implementations/juniper.md
    - FRRouting: implementations/frrouting.md
    - SONIC: implementations/sonic.md
  - Labs:
    - labs/index.md
    - Containerlab: labs/containerlab.md
    - GNS3: labs/gns3.md
  - RFCs & Standards:
    - rfcs/index.md
    - Architecture & Foundation:
      - RFC 8402 - SR Architecture: rfcs/rfc8402.md
    - SRv6 Data Plane:
      - RFC 8754 - SRH: rfcs/rfc8754.md
      - RFC 8986 - Network Programming: rfcs/rfc8986.md
      - RFC 9800 - SRv6 Compression: rfcs/rfc9800.md
    - Routing Protocol Extensions:
      - RFC 9352 - IS-IS Extensions: rfcs/rfc9352.md
      - RFC 9513 - OSPFv3 Extensions: rfcs/rfc9513.md
      - RFC 9350 - Flex-Algorithm: rfcs/rfc9350.md
      - RFC 9514 - BGP-LS Extensions: rfcs/rfc9514.md
    - Services & Overlay:
      - RFC 9252 - BGP Overlay Services: rfcs/rfc9252.md
      - RFC 9256 - SR Policy: rfcs/rfc9256.md
      - RFC 9433 - Mobile User Plane: rfcs/rfc9433.md
    - Operations & Telemetry:
      - RFC 9259 - OAM: rfcs/rfc9259.md
      - RFC 9487 - IPFIX for SRv6: rfcs/rfc9487.md
      - RFC 9855 - TI-LFA: rfcs/rfc9855.md
  - Community:
    - community/index.md
    - Contributing: community/contributing.md
    - AI Integrations: community/integrations.md
    - Legal & Disclaimer: community/legal.md
